<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqua Fire Solutions</title>
<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#111;
color:white;
}
.hero{
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1517048676732-d65bc937f952');
background-size:cover;
background-position:center;
padding:120px 20px;
text-align:center;
}
.hero h1{
font-size:60px;
margin:0;
}
.hero p{
font-size:22px;
max-width:800px;
margin:auto;
}
.section{
padding:80px 20px;
max-width:1200px;
margin:auto;
}
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{
background:#1f1f1f;
padding:25px;
border-radius:12px;
}
.contact{
background:#c40000;
text-align:center;
padding:60px 20px;
}
</style>
</head>
<body>

<section class="hero">
<h1>Aqua Fire Solutions</h1>
<p>Protecting What Matters Most</p>
</section>

<section class="section">
<h2>Our Services</h2>
<div class="cards">
<div class="card">Fire Sprinkler Installation</div>
<div class="card">Tenant Improvements</div>
<div class="card">Wet & Dry Systems</div>
<div class="card">Testing & Commissioning</div>
<div class="card">Inspections & Maintenance</div>
<div class="card">Emergency Service</div>
</div>
</section>

<section class="contact">
<h2>Request a Quote</h2>
<p>Serving British Columbia</p>
</section>

</body>
</html>
